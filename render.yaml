services:
  - type: web
    name: webclass-dashboard
    runtime: docker
    plan: free
    envVars:
      - key: HOSEI_USERNAME
        sync: false
      - key: HOSEI_PASSWORD
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: webclass-db
          property: connectionString

databases:
  - name: webclass-db
    plan: free
    databaseName: webclass
    user: webclass
